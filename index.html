<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="format-detection" content="telephone=no">
<title>Quản Lý Công Việc</title>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --orange: #FD8A02; --orange-dark: #e07a00;
    --gold: #C49A3C; --gold-light: #f0d080;
    --burgundy: #6b1a1a;
    --green-dark: #1a4a2e; --green-main: #2d6a4f; --green-mid: #3a8a62;
    --gray-100: #f8f9fa; --gray-200: #e9ecef; --gray-300: #dee2e6;
    --gray-500: #adb5bd; --gray-600: #6c757d; --gray-800: #343a40;
    --shadow-sm: 0 1px 5px rgba(0,0,0,0.06);
    --radius: 12px;

    /* Opinion box colors */
    --op-phoi-bg: #EBF4FF;
    --op-phoi-border: #3B82F6;
    --op-phoi-tag-bg: #DBEAFE;
    --op-phoi-tag-color: #1D4ED8;
    --op-sp-bg: #FFF8EC;
    --op-sp-border: #F59E0B;
    --op-sp-tag-bg: #FEF3C7;
    --op-sp-tag-color: #92400E;
  }
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { font-family:'Be Vietnam Pro','Segoe UI',sans-serif; background:#fdf8ee; color:var(--gray-800); font-size:15px; min-height:100vh; padding-bottom:70px; }

  /* ── TOPBAR ── */
  .mob-topbar {
    display:flex; align-items:center;
    background:var(--orange);
    padding:0 14px; height:58px;
    position:sticky; top:0; z-index:200;
    box-shadow:0 2px 8px rgba(200,80,0,.2);
  }
  .mob-topbar-left { width:38px; flex-shrink:0; }
  .mob-topbar-back {
    width:36px; height:36px; border-radius:8px;
    background:white; border:none; color:var(--orange);
    font-size:20px; font-weight:800; display:flex; align-items:center;
    justify-content:center; cursor:pointer; flex-shrink:0; line-height:1;
  }
  .mob-topbar-center { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; }
  .mob-topbar-title { font-size:17px; font-weight:800; color:white; line-height:1.2; }
  .mob-topbar-sub { font-size:11.5px; color:rgba(255,255,255,.9); font-weight:500; }
  .mob-topbar-sub a, .mob-topbar-sub a:visited { color:rgba(255,255,255,.9); text-decoration:none; }
  .mob-topbar-filter {
    width:38px; height:38px; border-radius:10px;
    background:rgba(255,255,255,.22); border:none; color:white;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer; flex-shrink:0; font-size:18px; position:relative;
  }
  .mob-filter-badge {
    position:absolute; top:-3px; right:-3px; width:16px; height:16px;
    background:#c0392b; border-radius:50%; font-size:10px; font-weight:800;
    color:white; display:none; align-items:center; justify-content:center;
  }
  .mob-filter-badge.show { display:flex; }

  /* ── CONTENT HEADER ── */
  .mob-content-hdr {
    display:flex; align-items:center; justify-content:center;
    padding:14px 60px 10px 60px; background:white;
    position:relative; border-bottom:none;
  }
  .mob-content-hdr-title { font-size:20px; font-weight:800; color:var(--green-dark); text-transform:uppercase; letter-spacing:.5px; text-align:center; }
  .mob-add-btn {
    position:absolute; right:16px;
    width:36px; height:36px; background:#FFF3CC; border:none; border-radius:10px;
    color:var(--orange); font-size:22px; font-weight:700; cursor:pointer;
    display:flex; align-items:center; justify-content:center; line-height:1;
  }

  /* ── SEARCH BAR ── */
  .mob-search-bar {
    display:flex; align-items:center; gap:8px;
    background:white; padding:8px 16px 10px;
    margin-top:0;
  }
  .mob-search-inner {
    flex:1; display:flex; align-items:center; gap:8px;
    background:var(--gray-100); border:1.5px solid var(--gray-300);
    border-radius:22px; padding:7px 14px;
    transition:border-color .15s;
  }
  .mob-search-inner:focus-within { border-color:var(--orange); background:white; }
  .mob-search-inner svg { width:15px; height:15px; color:var(--gray-500); flex-shrink:0; }
  .mob-search-inner input { border:none; background:transparent; font-family:inherit; font-size:14px; outline:none; flex:1; }

  /* ── STATUS TOGGLE ── */
  .status-toggle-wrap {
    display:flex; background:var(--gray-100); border:1.5px solid var(--gray-300);
    border-radius:20px; padding:2px; flex-shrink:0;
  }
  .status-toggle-btn {
    padding:5px 8px; border-radius:16px; font-size:16px; font-weight:700;
    cursor:pointer; transition:all .2s; color:var(--burgundy);
    border:none; background:transparent; font-family:inherit; line-height:1;
  }
  .status-toggle-btn.active { background:var(--orange); color:#6b1a1a; box-shadow:0 2px 5px rgba(200,80,0,.25); }
  .status-toggle-btn:not(.active):hover { color:var(--orange); }

  /* ── CARD LIST ── */
  .card-list { padding:0; margin-top:0; }
  .task-card {
    background:white; border-bottom:2px solid #6b1a1a;
    border-left:3px solid var(--orange);
    padding:15px 16px; margin-bottom:7px;
  }
  .task-card:first-child { border-top:2px solid #6b1a1a; }
  .task-card:last-child { border-bottom:none; margin-bottom:0; }

  /* task header */
  .task-header { display:flex; align-items:flex-start; gap:10px; margin-bottom:8px; }
  .status-dot { flex-shrink:0; width:11px; height:11px; border-radius:50%; margin-top:5px; }
  .dot-urgent    { background:#c0392b; box-shadow:0 0 0 3px rgba(192,57,43,.18); }
  .dot-important { background:#e07b39; box-shadow:0 0 0 3px rgba(224,123,57,.15); }
  .dot-waiting   { background:#c9a84c; box-shadow:0 0 0 3px rgba(201,168,76,.18); }
  .dot-done      { background:#27ae60; box-shadow:0 0 0 3px rgba(39,174,96,.18); }
  .dot-normal    { background:#2d6a4f; box-shadow:0 0 0 3px rgba(45,106,79,.18); }
  .task-name { font-weight:800; font-size:18px; color:var(--burgundy); line-height:1.3; flex:1; }
  .chi-tiet-btn {
    flex-shrink:0; font-size:12px; font-weight:700; color:var(--orange);
    padding:4px 10px; border:1.5px solid var(--orange); border-radius:7px;
    cursor:pointer; white-space:nowrap; background:white; font-family:inherit;
    margin-top:2px;
  }
  .task-detail-txt { font-size:13.5px; color:#1a2e1a; font-weight:500; line-height:1.65; margin:5px 0; }
  .task-time { font-size:13px; color:var(--burgundy); font-weight:700; display:flex; align-items:center; gap:4px; margin-top:6px; }

  /* ── OPINION BOXES (new design) ── */
  .opinions-wrap { margin-top:12px; display:flex; flex-direction:column; gap:8px; }

  .op-box {
    border-radius:10px;
    padding:12px 14px;
    border-left:4px solid transparent;
  }
  .op-box-phoi {
    background:var(--op-phoi-bg);
    border-left-color:var(--op-phoi-border);
  }
  .op-box-sp {
    background:var(--op-sp-bg);
    border-left-color:var(--op-sp-border);
  }

  .op-box-header {
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:8px; gap:8px;
  }
  .op-box-tag {
    font-size:12.5px; font-weight:700; padding:3px 10px; border-radius:20px;
  }
  .op-box-tag-phoi {
    background:var(--op-phoi-tag-bg); color:var(--op-phoi-tag-color);
  }
  .op-box-tag-sp {
    background:var(--op-sp-tag-bg); color:var(--op-sp-tag-color);
  }
  .op-box-tag-bld {
    background:#FEF3C7; color:#92400E;
  }
  .op-box-time {
    font-size:12px; font-weight:700; color:var(--burgundy); white-space:nowrap; flex-shrink:0;
  }
  .op-box-text {
    font-size:13.5px; color:#111a14; font-weight:500; line-height:1.65;
    margin-bottom:9px;
  }
  .op-box-actions {
    display:flex; align-items:center; gap:8px; flex-wrap:wrap;
  }

  /* like button */
  .like-wrap { position:relative; display:inline-block; }
  .op-like-btn {
    display:inline-flex; align-items:center; gap:5px; font-size:13px;
    font-weight:600; color:var(--gray-500); cursor:pointer;
    border:1.5px solid rgba(0,0,0,.12); border-radius:20px; padding:4px 12px;
    background:rgba(255,255,255,.7); transition:all .15s; font-family:inherit; user-select:none;
  }
  .op-like-btn:hover { border-color:var(--gold); color:#a07820; background:white; }
  .op-like-btn.liked { border-color:#e07b39; color:#e07b39; background:rgba(255,255,255,.9); }
  .op-like-count { font-size:13px; font-weight:800; min-width:12px; text-align:center; }
  .likes-popup {
    position:absolute; bottom:calc(100% + 8px); left:0; z-index:500;
    background:white; border:1.5px solid var(--gray-300); border-radius:10px;
    box-shadow:0 6px 24px rgba(0,0,0,.15); padding:10px 14px;
    min-width:180px; max-width:80vw; display:none; animation:popupAppear .13s ease;
  }
  @keyframes popupAppear{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
  .likes-popup.open { display:block; }
  .likes-popup-title { font-size:11px; font-weight:700; color:var(--gray-500); text-transform:uppercase; letter-spacing:.05em; margin-bottom:7px; border-bottom:1px solid var(--gray-200); padding-bottom:5px; }
  .likes-popup-item { display:flex; align-items:center; gap:7px; padding:4px 0; font-size:13px; font-weight:600; color:var(--gray-800); border-bottom:1px solid #f0f0f0; }
  .likes-popup-item:last-child { border-bottom:none; }
  .likes-popup-avatar { width:22px; height:22px; border-radius:5px; background:#fff3cc; color:#a07820; font-size:9px; font-weight:800; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .likes-popup-empty { font-size:12px; color:var(--gray-500); font-style:italic; text-align:center; padding:3px 0; }

  .op-edit-btn {
    display:inline-flex; align-items:center; gap:5px; font-size:13px;
    font-weight:600; color:var(--gray-500); cursor:pointer;
    border:1.5px solid rgba(0,0,0,.12); border-radius:20px; padding:4px 12px;
    background:rgba(255,255,255,.7); transition:all .15s; font-family:inherit;
  }
  .op-edit-btn:hover { border-color:var(--gold); color:#a07820; background:white; }
  .op-edited-tag { font-size:12px; color:var(--gray-500); font-style:italic; }
  .op-edit-area { width:100%; border:1.5px solid var(--gold); border-radius:7px; padding:8px 11px; font-family:inherit; font-size:14px; color:var(--gray-800); outline:none; resize:vertical; min-height:65px; margin-top:5px; background:white; }
  .op-edit-actions { display:flex; gap:8px; margin-top:6px; }
  .op-save-btn { padding:5px 14px; background:var(--green-main); color:white; border:none; border-radius:6px; font-family:inherit; font-size:14px; font-weight:700; cursor:pointer; }
  .op-cancel-btn { padding:5px 14px; background:white; color:var(--gray-600); border:1.5px solid var(--gray-300); border-radius:6px; font-family:inherit; font-size:14px; font-weight:600; cursor:pointer; }

  /* ── OUTGOING CARDS ── */
  .progress-wrap { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
  .progress-bar { flex:1; height:7px; background:var(--gray-200); border-radius:4px; overflow:hidden; }
  .progress-fill { height:100%; border-radius:4px; transition:width .3s; }
  .prog-done    { background:#27ae60; }
  .prog-partial { background:#e07b39; }
  .prog-none    { background:#dee2e6; }
  .progress-pct { font-size:13px; font-weight:700; color:var(--gray-600); flex-shrink:0; }
  .assigned-ban { font-size:14.5px; font-weight:700; color:var(--green-dark); margin-bottom:3px; }
  .assigned-note { font-size:13px; color:var(--gray-600); font-weight:500; }

  /* mobile toggles (kept for outgoing cards) */
  .mobile-toggles { display:flex; gap:7px; flex-wrap:wrap; margin-top:11px; padding-top:10px; border-top:1px solid #f0e4b8; }
  .mtoggle {
    display:inline-flex; align-items:center; gap:5px;
    padding:6px 12px; border-radius:20px;
    border:1.5px solid var(--gray-300); background:var(--gray-100);
    font-family:inherit; font-size:13px; font-weight:700;
    color:var(--gray-600); cursor:pointer; transition:all .15s; white-space:nowrap;
  }
  .mtoggle:hover { border-color:var(--gold); background:#FFFDF5; color:#a07820; }
  .mtoggle.active { border-color:var(--gold); background:#FFF3CC; color:#a07820; }
  .mtoggle.active .mtoggle-arrow { transform:rotate(180deg); }
  .mtoggle-count { background:var(--green-main); color:white; border-radius:10px; font-size:11px; font-weight:800; padding:1px 6px; min-width:18px; text-align:center; }
  .mtoggle.active .mtoggle-count { background:var(--green-dark); }
  .mtoggle-arrow { font-size:9px; transition:transform .2s; display:inline-block; }

  .expand-col { display:none; margin-top:11px; padding-top:11px; border-top:1.5px dashed #e8d49a; animation:mFadeIn .2s ease; }
  .expand-col.open { display:block; }
  @keyframes mFadeIn { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:translateY(0)} }
  .expand-label { font-size:11px; font-weight:700; color:var(--green-mid); text-transform:uppercase; letter-spacing:.05em; margin-bottom:7px; }
  .expand-label.sp { color:var(--burgundy); }

  /* ── PAGINATION ── */
  .bottom-bar { display:flex; align-items:center; justify-content:space-between; padding:14px 16px 8px; flex-wrap:wrap; gap:8px; background:white; border-top:1px solid var(--gray-200); }
  .pg-info { font-size:13px; color:var(--gray-600); font-weight:600; }
  .pg-info strong { color:var(--gold); }
  .pagination { display:flex; align-items:center; gap:5px; flex-wrap:wrap; }
  .pg-btn { min-width:36px; height:36px; border-radius:9px; border:1.5px solid #e8d9a0; background:white; color:var(--gold); font-size:14px; font-weight:600; cursor:pointer; font-family:inherit; display:flex; align-items:center; justify-content:center; padding:0 7px; transition:all .15s; }
  .pg-btn:hover:not(:disabled) { border-color:var(--gold); background:#FFFDF5; color:#a07820; }
  .pg-btn.active { background:#FFF3CC; border-color:var(--gold); color:#a07820; font-weight:800; }
  .pg-btn:disabled { opacity:.35; cursor:default; }
  .pg-btn.dots { border:none; background:none; pointer-events:none; color:var(--gray-500); }

  /* ── FILTER SHEET ── */
  .filter-sheet-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:600; }
  .filter-sheet-overlay.open { display:block; }
  .filter-sheet {
    position:fixed; bottom:0; left:0; right:0; z-index:700;
    background:white; border-radius:20px 20px 0 0;
    max-height:88vh; transform:translateY(100%);
    transition:transform .3s cubic-bezier(.32,.72,0,1);
    display:flex; flex-direction:column;
    box-shadow:0 -4px 30px rgba(0,0,0,.18);
  }
  .filter-sheet.open { transform:translateY(0); }
  .fs-handle { width:36px; height:4px; border-radius:2px; background:#ddd; margin:12px auto 0; flex-shrink:0; }
  .fs-header { display:flex; align-items:center; justify-content:space-between; padding:13px 18px 10px; flex-shrink:0; border-bottom:1px solid var(--gray-200); }
  .fs-title { font-size:15px; font-weight:800; color:#111; }
  .fs-close { width:30px; height:30px; border-radius:50%; background:var(--gray-100); border:none; font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center; color:#111; }
  .fs-body { overflow-y:auto; padding:8px 0; flex:1; }

  .fs-acc { border-bottom:1px solid var(--gray-200); }
  .fs-acc-header {
    display:flex; align-items:center; justify-content:space-between;
    padding:13px 18px; cursor:pointer; background:white;
    border:none; width:100%; font-family:inherit; text-align:left;
  }
  .fs-acc-header:active { background:#fafafa; }
  .fs-acc-label { font-size:15px; font-weight:700; color:#111; }
  .fs-acc-value { font-size:13px; color:var(--burgundy); font-weight:600; margin-right:8px; }
  .fs-acc-arrow { font-size:11px; color:#666; transition:transform .2s; }
  .fs-acc-header.open .fs-acc-arrow { transform:rotate(180deg); }
  .fs-acc-body { display:none; padding:4px 18px 14px; }
  .fs-acc-body.open { display:block; }

  .fs-opt {
    display:flex; align-items:center; justify-content:space-between;
    padding:11px 14px; border-radius:10px; cursor:pointer;
    font-family:inherit; font-size:14.5px; font-weight:600; color:#111;
    border:none; background:transparent; width:100%; text-align:left;
    transition:background .12s;
  }
  .fs-opt:hover { background:#fafafa; }
  .fs-opt.active { background:#FFF3E0; color:var(--orange); }
  .fs-opt-check { font-size:16px; opacity:0; }
  .fs-opt.active .fs-opt-check { opacity:1; color:var(--orange); }

  .fs-search { display:flex; align-items:center; gap:8px; background:var(--gray-100); border:1.5px solid var(--gray-300); border-radius:10px; padding:8px 13px; margin:4px 18px 10px; }
  .fs-search:focus-within { border-color:var(--orange); background:white; }
  .fs-search svg { width:14px; height:14px; color:#666; flex-shrink:0; }
  .fs-search input { border:none; background:transparent; font-family:inherit; font-size:14px; outline:none; flex:1; color:#111; }
  .fs-search input::placeholder { color:#999; }

  .fs-footer { display:flex; gap:10px; padding:11px 18px 20px; flex-shrink:0; border-top:1px solid var(--gray-200); }
  .fs-reset { flex:1; padding:11px; border:1.5px solid var(--gray-300); background:white; border-radius:10px; font-family:inherit; font-size:14px; font-weight:700; color:#111; cursor:pointer; }
  .fs-apply { flex:2; padding:11px; background:var(--orange); border:none; border-radius:10px; font-family:inherit; font-size:14px; font-weight:800; color:white; cursor:pointer; }
  .fs-apply:hover { background:var(--orange-dark); }

  /* ── BOTTOM NAV ── */
  .mob-bottom-nav {
    display:flex; align-items:center;
    position:fixed; bottom:0; left:0; right:0; z-index:300;
    background:white; border-top:1px solid var(--gray-200);
    height:60px; box-shadow:0 -2px 12px rgba(0,0,0,.08);
  }
  .mob-nav-item { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; cursor:pointer; font-size:11px; font-weight:700; color:var(--gray-500); padding:5px 0; }
  .mob-nav-item.active { color:var(--orange); }
  .mob-nav-icon { font-size:21px; line-height:1; }
  .mob-nav-profile-avatar { width:24px; height:24px; background:var(--burgundy); color:#c9a84c; border-radius:6px; font-weight:800; font-size:11px; display:flex; align-items:center; justify-content:center; }

  ::-webkit-scrollbar { width:4px; height:4px; }
  ::-webkit-scrollbar-thumb { background:var(--gray-300); border-radius:3px; }
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="mob-topbar">
  <div class="mob-topbar-left">
    <button class="mob-topbar-back">‹</button>
  </div>
  <div class="mob-topbar-center">
    <div class="mob-topbar-title">Ban Tri Sự</div>
    <div class="mob-topbar-sub">Trưởng Ban: Phan Tuấn Anh · <span style="color:rgba(255,255,255,.9);text-decoration:none;">0123 456 788</span></div>
  </div>
  <button class="mob-topbar-filter" onclick="openFilterSheet()">
    <svg viewBox="0 0 24 24" fill="none" width="22" height="22">
      <circle cx="6" cy="7" r="2" stroke="currentColor" stroke-width="2"/>
      <line x1="6" y1="3" x2="6" y2="5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <line x1="6" y1="9" x2="6" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <circle cx="18" cy="17" r="2" stroke="currentColor" stroke-width="2"/>
      <line x1="18" y1="3" x2="18" y2="15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
      <line x1="18" y1="19" x2="18" y2="21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </svg>
    <span class="mob-filter-badge" id="mobFilterBadge">0</span>
  </button>
</div>

<!-- FILTER SHEET OVERLAY -->
<div class="filter-sheet-overlay" id="filterSheetOverlay" onclick="closeFilterSheet()"></div>

<!-- FILTER SHEET -->
<div class="filter-sheet" id="filterSheet">
  <div class="fs-handle"></div>
  <div class="fs-header">
    <span class="fs-title">Bộ lọc</span>
    <button class="fs-close" onclick="closeFilterSheet()">✕</button>
  </div>
  <div class="fs-body">
    <div class="fs-search" style="margin-top:8px;">
      <svg viewBox="0 0 20 20" fill="none"><circle cx="9" cy="9" r="5.5" stroke="currentColor" stroke-width="1.5"/><path d="M13.5 13.5L17 17" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      <input type="text" id="mobKeywordInput" placeholder="Tìm tên việc, nội dung...">
    </div>

    <div class="fs-acc">
      <button class="fs-acc-header" onclick="toggleAcc(this)">

  if(!ddmmyyyy) return '';

  const k=`${p[2]}-${p[1].padStart(2,'0')}-${p[0].padStart(2,'0')}`;

  return s;
}

  if(!ds) return {time:'',date:''};

  return {time:'', date:ds};
}

}
function truncateWords(str,maxWords){

function parseDMY(str){
  if(!str) return null;
  const m=str.match(/(\d{2})\/(\d{2})\/(\d{4})/);
  if(!m) return null;
  const d=new Date(+m[3],+m[2]-1,+m[1]); d.setHours(0,0,0,0);
  return isNaN(d)?null:d;
}
function parseRange(task){
  const s=task.time||'';
  const mR=s.match(/(\d{2})\/(\d{2})\s*[→–-]\s*(\d{2})\/(\d{2})\/(\d{4})/);
  if(mR){const yr=+mR[5];const st=new Date(yr,+mR[2]-1,+mR[1]);st.setHours(0,0,0,0);const en=new Date(yr,+mR[4]-1,+mR[3]);en.setHours(0,0,0,0);return{start:st,end:en};}

  return null;

function coversDay(task,day){const r=parseRange(task);if(!r)return false;return day>=r.start&&day<=r.end;}
function overlaps(task,from,to){const r=parseRange(task);if(!r)return false;return r.start<=to&&r.end>=from;}
function isTrulyOverdue(task){
  if(task.tags&&task.tags.includes('done'))return false;
  const r=parseRange(task);if(!r)return false;return r.end<TODAY;
}
function getStatusTag(task){
  if(task.tags&&task.tags.includes('done'))      return 'done';

  if(task.tags&&task.tags.includes('waiting'))   return 'waiting';
  if(task.tags&&task.tags.includes('important')) return 'important';
  return 'normal';
}

/* ===== STATE ===== */
let filterStatus='all',filterDate='all',filterBan='all',sortMode='deadline';
let currentLoai='phoi-hop',currentStatusTab='active';
const IPP=5;
let currentPage=1,filteredList=[],currentOutPage=1,filteredOutList=[];

function sortTasks(list){
  const priority={urgent:0,waiting:1,important:2,normal:3,done:4};
  return [...list].sort((a,b)=>{
    if(sortMode==='name') return a.name.localeCompare(b.name,'vi');
    if(sortMode==='status') return (priority[getStatusTag(a)]??3)-(priority[getStatusTag(b)]??3);
    const ra=parseRange(a),rb=parseRange(b);
    return (ra?ra.end.getTime():9e15)-(rb?rb.end.getTime():9e15);
  });
}

function matchDate(task){
  if(filterDate==='all') return true;
  if(filterDate==='today')    return coversDay(task,TODAY);
  if(filterDate==='tomorrow') return coversDay(task,relDate(1));
  if(filterDate==='week')     return overlaps(task,TODAY,relDate(7));
  return true;
}

function applyFilters(){
  const kw=(document.getElementById('keywordInput').value||'').toLowerCase().trim();
  filteredList=tasks.filter(t=>{
    const st=getStatusTag(t);
    if(filterStatus==='normal'){if(st!=='normal')return false;}
    else if(filterStatus!=='all'&&st!==filterStatus)return false;
    if(filterBan!=='all'&&!t.bans.includes(filterBan))return false;
    if(!matchDate(t))return false;
    if(kw){const h=(t.name+' '+t.detail+' '+t.bans.join(' ')+' '+(t.phoi_hop||[]).map(o=>o.text).join(' ')+' '+(t.sp_bld||[]).map(o=>o.text).join(' ')).toLowerCase();if(!h.includes(kw))return false;}
    return true;
  });
  filteredList=sortTasks(filteredList);
  filteredOutList=outgoingTasks.filter(t=>{
    if(kw){const h=(t.name+' '+t.detail+' '+t.assignedTo+' '+t.latestReport).toLowerCase();if(!h.includes(kw))return false;}
    return true;
  });
  currentPage=1;currentOutPage=1;
  renderPage();renderPagination();renderOutPage();renderOutPagination();
}

function switchStatusTab(tab){
  currentStatusTab=tab;
  document.querySelectorAll('.status-toggle-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('stab-'+tab).classList.add('active');
  currentPage=1;renderPage();renderPagination();
}

/* ===== RENDER OPINION BOXES (new design) ===== */
function renderOpinionBoxes(task) {
  const phoi = task.phoi_hop || [];
  const sp = task.sp_bld || [];
  if (!phoi.length && !sp.length) return '';

  let html = '<div class="opinions-wrap">';

  // Ban Phoi Hop boxes (blue)
  phoi.forEach(op => {
    const likers = sampleLikers[op.id] || [];
    html += `
    <div class="op-box op-box-phoi" id="opbox_${op.id}">
      <div class="op-box-header">
        <span class="op-box-tag op-box-tag-phoi">${op.author}</span>
        <span class="op-box-time">${opTimeLabel(op.date)}</span>
      </div>
      <div class="op-box-text" id="optext_${op.id}">${truncateWords(op.text, 35)}</div>
      ${op.edited ? '<div class="op-edited-tag" style="margin-bottom:6px;">· đã chỉnh sửa</div>' : ''}
      <div class="op-box-actions">
        <div class="like-wrap" id="likewrap_${op.id}">
          <button class="op-like-btn ${op.liked ? 'liked' : ''}" onclick="toggleLike('${task.id}','${op.id}',this)">
            <span>${op.liked ? '👍' : '👍'}</span>
            <span class="op-like-count">${op.likes}</span>
            <span style="font-size:12px;opacity:.7;">thích</span>
          </button>
          <div class="likes-popup" id="likespopup_${op.id}">
            <div class="likes-popup-title">Đã thích ❤️</div>
            ${likers.length === 0
              ? '<div class="likes-popup-empty">Chưa có ai thích</div>'
              : likers.map(n => `<div class="likes-popup-item"><div class="likes-popup-avatar">${n.slice(-2)}</div>${n}</div>`).join('')}
          </div>
        </div>
        <button class="op-edit-btn" onclick="startEdit('${task.id}','${op.id}')">✏️ Sửa</button>
      </div>
    </div>`;
  });

  // Sư Phụ / BLĐ boxes (yellow/amber)
  [...sp].sort((a,b)=>({sp:0,bld:1}[a.type]??2)-({sp:0,bld:1}[b.type]??2))
    .forEach(op => {
      const tagClass = op.type === 'sp' ? 'op-box-tag-sp' : 'op-box-tag-bld';
      html += `
    <div class="op-box op-box-sp">
      <div class="op-box-header">
        <span class="op-box-tag ${tagClass}">${op.author}</span>
        <span class="op-box-time">${opTimeLabel(op.date)}</span>
      </div>
      <div class="op-box-text">${truncateWords(op.text, 35)}</div>
    </div>`;
    });

  html += '</div>';
  return html;
}

/* ===== LIKE / EDIT ===== */
function toggleLike(taskId,opId,btn){
  const task=tasks.find(t=>String(t.id)===String(taskId));if(!task)return;
  const op=task.phoi_hop.find(o=>o.id===opId);if(!op)return;
  op.liked=!op.liked;op.likes+=op.liked?1:-1;
  const likers=sampleLikers[op.id]||[];
  if(op.liked){if(!likers.includes('Phan Tuấn Anh'))likers.push('Phan Tuấn Anh');}
  else{const idx=likers.indexOf('Phan Tuấn Anh');if(idx>=0)likers.splice(idx,1);}
  sampleLikers[op.id]=likers;
  btn.innerHTML=`<span>👍</span><span class="op-like-count">${op.likes}</span><span style="font-size:12px;opacity:.7;">thích</span>`;
  btn.classList.toggle('liked',op.liked);
}

function startEdit(taskId,opId){
  const task=tasks.find(t=>String(t.id)===String(taskId));if(!task)return;
  const op=task.phoi_hop.find(o=>o.id===opId);if(!op)return;
  const box=document.getElementById('opbox_'+opId);if(!box)return;
  const textEl=box.querySelector('#optext_'+opId);if(!textEl)return;
  textEl.innerHTML=`<textarea class="op-edit-area" id="editarea_${opId}">${op.text}</textarea><div class="op-edit-actions"><button class="op-save-btn" onclick="saveEdit('${taskId}','${opId}')">✓ Lưu</button><button class="op-cancel-btn" onclick="cancelEdit('${taskId}','${opId}')">Hủy</button></div>`;
}
function saveEdit(taskId,opId){
  const task=tasks.find(t=>String(t.id)===String(taskId));if(!task)return;
  const op=task.phoi_hop.find(o=>o.id===opId);if(!op)return;
  const area=document.getElementById('editarea_'+opId);if(!area)return;
  op.text=area.value.trim()||op.text;op.edited=true;renderPage();
}
function cancelEdit(taskId,opId){
  const task=tasks.find(t=>String(t.id)===String(taskId));if(!task)return;
  const op=task.phoi_hop.find(o=>o.id===opId);if(!op)return;
  const textEl=document.getElementById('optext_'+opId);if(!textEl)return;
  textEl.innerHTML=truncateWords(op.text,35);
}

/* ===== MOBILE TOGGLE (for outgoing cards) ===== */
function mToggle(btn,colId){
  const card=btn.closest('.task-card');
  const col=card.querySelector('#'+colId);
  if(!col)return;
  const isOpen=col.classList.contains('open');
  col.classList.toggle('open',!isOpen);
  btn.classList.toggle('active',!isOpen);
}

/* ===== RENDER MAIN ===== */
function renderPage(){
  const body=document.getElementById('taskBody');
  let display=filteredList.filter(t=>{
    const st=getStatusTag(t);
    if(currentStatusTab==='done') return st==='done';
    return st!=='done';
  });
  const start=(currentPage-1)*IPP;
  const slice=display.slice(start,start+IPP);
  document.getElementById('pgInfo').innerHTML=
    display.length===0?'Không tìm thấy công việc nào'
    :`Hiển thị <strong>${start+1}–${Math.min(start+IPP,display.length)}</strong> / <strong>${display.length}</strong>`;
  if(!slice.length){body.innerHTML=`<div style="text-align:center;padding:40px;color:#bbb;font-size:14px;font-style:italic;">Không tìm thấy công việc nào.</div>`;return;}
  body.innerHTML=slice.map(t=>{
    const dc=getDotClass(t);
    const tAL=convertTimeRange(t.time);
    return `<div class="task-card">
      <div class="task-header">
        ${dc?`<span class="status-dot ${dc}"></span>`:''}
        <div class="task-name">${t.name}</div>
        <button class="chi-tiet-btn">Chi tiết</button>
      </div>
      ${t.detail?`<div class="task-detail-txt">${truncateWords(t.detail,30)}</div>`:''}
      ${tAL?`<div class="task-time">📅 ${tAL}</div>`:''}
      ${renderOpinionBoxes(t)}
    </div>`;
  }).join('');
}

/* ===== RENDER GIAO ĐI ===== */
function renderOutPage(){
  const body=document.getElementById('outTaskBody');
  const start=(currentOutPage-1)*IPP;
  const slice=filteredOutList.slice(start,start+IPP);
  document.getElementById('pgInfoOut').innerHTML=
    filteredOutList.length===0?'Không tìm thấy công việc nào'
    :`Hiển thị <strong>${start+1}–${Math.min(start+IPP,filteredOutList.length)}</strong> / <strong>${filteredOutList.length}</strong>`;
  if(!slice.length){body.innerHTML=`<div style="text-align:center;padding:40px;color:#bbb;font-size:14px;font-style:italic;">Không tìm thấy công việc nào.</div>`;return;}
  body.innerHTML=slice.map(t=>{
    const st=getStatusTag(t);
    const dotColor=getDotColor(st);
    const tAL=convertTimeRange(t.time);
    const progClass=t.progress===100?'prog-done':t.progress>0?'prog-partial':'prog-none';
    const uid='o'+t.id;
    return `<div class="task-card">
      <div class="task-header">
        <span class="status-dot" style="background:${dotColor};box-shadow:0 0 0 3px ${dotColor}22;"></span>
        <div class="task-name">${t.name}</div>
      </div>
      <div class="task-detail-txt">${truncateWords(t.detail,30)}</div>
      ${tAL?`<div class="task-time">📅 ${tAL}</div>`:''}
      <div class="mobile-toggles">
        <button class="mtoggle" onclick="mToggle(this,'${uid}_ban')">🏛 Ban được giao <span class="mtoggle-arrow">▼</span></button>
        <button class="mtoggle" onclick="mToggle(this,'${uid}_prog')">📊 Tiến độ ${t.progress>0?`<span class="mtoggle-count">${t.progress}%</span>`:''} <span class="mtoggle-arrow">▼</span></button>
      </div>
      <div class="expand-col" id="${uid}_ban">
        <div class="expand-label">🏛 Ban Được Giao</div>
        <div class="assigned-ban">${t.assignedTo}</div>
        <div class="assigned-note">${t.assignedNote}</div>
      </div>
      <div class="expand-col" id="${uid}_prog">
        <div class="expand-label sp">📊 Tiến Độ & Báo Cáo</div>
        <div class="progress-wrap">
          <div class="progress-bar"><div class="progress-fill ${progClass}" style="width:${t.progress}%"></div></div>
          <span class="progress-pct">${t.progress}%</span>
        </div>
        ${t.latestReport?`<div style="font-size:13.5px;color:#111a14;font-weight:500;line-height:1.65;">${truncateWords(t.latestReport,35)}</div>`:''}
        ${t.reportDate?`<div style="margin-top:5px;font-size:12px;color:var(--burgundy);font-weight:700;">${opTimeLabel(t.reportDate)}</div>`:''}
      </div>
    </div>`;
  }).join('');
}

/* ===== PAGINATION ===== */
function renderPagination(){
  let display=filteredList.filter(t=>{const st=getStatusTag(t);if(currentStatusTab==='done')return st==='done';return st!=='done';});
  const total=Math.ceil(display.length/IPP);
  const c=document.getElementById('pagination');
  if(total<=1){c.innerHTML='';return;}
  let h=`<button class="pg-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}>‹</button>`;
  for(let i=1;i<=total;i++){
    if(total>7&&i>2&&i<total-1&&Math.abs(i-currentPage)>1){if(i===3||i===total-2)h+=`<button class="pg-btn dots">…</button>`;continue;}
    h+=`<button class="pg-btn${i===currentPage?' active':''}" onclick="goPage(${i})">${i}</button>`;
  }
  h+=`<button class="pg-btn" onclick="goPage(${currentPage+1})" ${currentPage===total?'disabled':''}>›</button>`;
  c.innerHTML=h;
}
function goPage(n){
  let display=filteredList.filter(t=>{const st=getStatusTag(t);if(currentStatusTab==='done')return st==='done';return st!=='done';});
  const total=Math.ceil(display.length/IPP);
  if(n<1||n>total)return;
  currentPage=n;renderPage();renderPagination();
  window.scrollTo({top:0,behavior:'smooth'});
}
function renderOutPagination(){
  const total=Math.ceil(filteredOutList.length/IPP);
  const c=document.getElementById('paginationOut');
  if(total<=1){c.innerHTML='';return;}
  let h=`<button class="pg-btn" onclick="goOutPage(${currentOutPage-1})" ${currentOutPage===1?'disabled':''}>‹</button>`;
  for(let i=1;i<=total;i++){
    if(total>7&&i>2&&i<total-1&&Math.abs(i-currentOutPage)>1){if(i===3||i===total-2)h+=`<button class="pg-btn dots">…</button>`;continue;}
    h+=`<button class="pg-btn${i===currentOutPage?' active':''}" onclick="goOutPage(${i})">${i}</button>`;
  }
  h+=`<button class="pg-btn" onclick="goOutPage(${currentOutPage+1})" ${currentOutPage===total?'disabled':''}>›</button>`;
  c.innerHTML=h;
}
function goOutPage(n){
  const total=Math.ceil(filteredOutList.length/IPP);
  if(n<1||n>total)return;
  currentOutPage=n;renderOutPage();renderOutPagination();
  window.scrollTo({top:0,behavior:'smooth'});
}

/* ===== FILTER SHEET ===== */
let fsTemp={};

const ACC_LABELS = {
  sort: { deadline:'Ngày hạn', name:'Tên A→Z', status:'Ưu tiên' },
  status: { all:'Tất cả', urgent:'Khẩn Cấp', important:'Quan Trọng', waiting:'Xin Chỉ Dạy', normal:'Bình Thường' },
  progress: { active:'Đang làm', done:'Hoàn thành' },
  date: { all:'Tất cả', today:'Hôm nay', tomorrow:'Ngày mai', week:'7 ngày tới' },
  loai: { 'phoi-hop':'Phối hợp', 'giao-di':'Giao đi' },
  ban: { all:'Tất cả' },
};

function toggleAcc(hdr) {
  hdr.classList.toggle('open');
  const body = hdr.nextElementSibling;
  body.classList.toggle('open');
}

function fsOptTap(btn) {
  const f = btn.dataset.filter;
  const v = btn.dataset.val;
  btn.closest('.fs-acc-body').querySelectorAll('.fs-opt').forEach(o => o.classList.remove('active'));
  btn.classList.add('active');
  fsTemp[f] = v;
  const valEl = document.getElementById('acc-val-' + f);
  if (valEl) {
    const banLabel = f === 'ban' && v !== 'all' ? v : null;
    valEl.textContent = banLabel || (ACC_LABELS[f] && ACC_LABELS[f][v]) || v;
  }
}

function openFilterSheet(){
  fsTemp = { status:filterStatus, sort:sortMode, date:filterDate, loai:currentLoai, ban:filterBan, progress:currentStatusTab };
  document.querySelectorAll('.fs-opt').forEach(o => {
    const f = o.dataset.filter, v = o.dataset.val;
    o.classList.toggle('active', fsTemp[f] === v);
  });
  Object.keys(fsTemp).forEach(f => {
    const valEl = document.getElementById('acc-val-' + f);
    if (!valEl) return;
    const v = fsTemp[f];
    const banLabel = f === 'ban' && v !== 'all' ? v : null;
    valEl.textContent = banLabel || (ACC_LABELS[f] && ACC_LABELS[f][v]) || v;
  });
  document.getElementById('mobKeywordInput').value = document.getElementById('keywordInput').value;
  document.getElementById('filterSheet').classList.add('open');
  document.getElementById('filterSheetOverlay').classList.add('open');
  document.body.style.overflow='hidden';
}

function closeFilterSheet(){
  document.getElementById('filterSheet').classList.remove('open');
  document.getElementById('filterSheetOverlay').classList.remove('open');
  document.body.style.overflow='';
  document.querySelectorAll('.fs-acc-header.open').forEach(h => { h.classList.remove('open'); h.nextElementSibling.classList.remove('open'); });
}

function fsReset(){
  fsTemp = { status:'all', sort:'deadline', date:'all', loai:'phoi-hop', ban:'all', progress:'active' };
  document.querySelectorAll('.fs-opt').forEach(o => {
    const f = o.dataset.filter, v = o.dataset.val;
    o.classList.toggle('active', fsTemp[f] === v);
  });
  Object.keys(fsTemp).forEach(f => {
    const valEl = document.getElementById('acc-val-' + f);
    if (valEl) valEl.textContent = (ACC_LABELS[f] && ACC_LABELS[f][fsTemp[f]]) || fsTemp[f];
  });
  document.getElementById('mobKeywordInput').value='';
  document.getElementById('keywordInput').value='';
}

function fsApply(){
  const kw = document.getElementById('mobKeywordInput').value;
  document.getElementById('keywordInput').value = kw;
  filterStatus = fsTemp.status || 'all';
  sortMode = fsTemp.sort || 'deadline';
  filterDate = fsTemp.date || 'all';
  filterBan = fsTemp.ban || 'all';
  const newLoai = fsTemp.loai || 'phoi-hop';
  if (newLoai !== currentLoai) {
    currentLoai = newLoai;
    document.getElementById('panel-main').style.display = newLoai !== 'giao-di' ? 'block' : 'none';
    document.getElementById('panel-giao-di').style.display = newLoai === 'giao-di' ? 'block' : 'none';
    document.getElementById('statusToggleWrap').style.display = newLoai !== 'giao-di' ? 'flex' : 'none';
    document.getElementById('contentHdrTitle').textContent = newLoai === 'giao-di' ? 'Công việc giao đi' : 'Đầu mục công việc';
  }
  if (fsTemp.progress && fsTemp.progress !== currentStatusTab) switchStatusTab(fsTemp.progress);
  let n = 0;
  if (filterStatus !== 'all') n++; if (filterDate !== 'all') n++;
  if (filterBan !== 'all') n++; if (kw.trim()) n++; if (currentStatusTab !== 'active') n++;
  const badge = document.getElementById('mobFilterBadge');
  if (badge) { badge.textContent = n; badge.classList.toggle('show', n > 0); }
  applyFilters();
  closeFilterSheet();
}

function buildFsBanList(){
  const bans = new Set(); tasks.forEach(t => t.bans.forEach(b => bans.add(b)));
  const body = document.getElementById('fsBanAccBody');
  [...bans].sort().forEach(b => {
    const btn = document.createElement('button');
    btn.className = 'fs-opt'; btn.dataset.filter = 'ban'; btn.dataset.val = b;
    btn.innerHTML = b + '<span class="fs-opt-check">✓</span>';
    btn.onclick = () => fsOptTap(btn);
    body.appendChild(btn);
    ACC_LABELS.ban[b] = b;
  });
}

/* ===== INIT ===== */
buildFsBanList();
applyFilters();
</script>
